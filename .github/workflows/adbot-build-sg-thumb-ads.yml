name: adbot · build SG thumbnail ads (3× video, PAUSED)

# Builds the 3 SG-winner ads whose cross-account thumbnails couldn't be ingested
# inline (正常健康的孩子 / 运动 / Eunice). Pulls each SG video's /thumbnails uri,
# re-uploads it into the US account for a US image_hash, then creates the video
# creative + ad into the existing "PNW | SG Winners" ad set — all PAUSED.
# Idempotent via state/entities_sg_thumb_ads.json.

on:
  workflow_dispatch: {}

concurrency:
  group: adbot-build-sg-thumb-ads
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - name: Build SG thumbnail ads (PAUSED)
        env:
          ADBOT_ROOT: ${{ github.workspace }}
          ADBOT_CONFIG: ${{ github.workspace }}/config/config.yaml
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
        run: python scripts/build_sg_thumb_ads.py
      - name: Persist created entity IDs back to the branch
        run: |
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git add state/ || true
          git commit -m "build-sg-thumb-ads: persist created ad ids [skip ci]" || echo "no state change"
          git push || echo "push skipped"
