name: adbot · build lowest-CPL ad (北美H4, ACTIVE)

# Downloads the operator's new video (北美H4 · Hook 4), uploads it into the US account,
# and adds ONE ad into the lowest-CPL active ad set (Parents 3–17 + Engaged), ACTIVE,
# with the approved caption + headline + UTM url_tags. Idempotent.

on:
  workflow_dispatch: {}

concurrency:
  group: adbot-build-lowest-cpl-ad
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - name: Build lowest-CPL ad (ACTIVE)
        env:
          ADBOT_ROOT: ${{ github.workspace }}
          ADBOT_CONFIG: ${{ github.workspace }}/config/config.yaml
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
        run: python scripts/build_lowest_cpl_ad.py
      - name: Persist created entity IDs back to the branch
        run: |
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git add state/ || true
          git commit -m "build-lowest-cpl-ad: persist created ad id [skip ci]" || echo "no state change"
          git push || echo "push skipped"
