name: adbot · SG winners → US lookup (read-only)

# Manual, read-only: finds the SG top ads (milk/bread excluded) in the SG ad account
# and reports each one's object_story_id + page, so the winners can be re-run as
# existing-post ads on the 加州/US account. No writes.

on:
  workflow_dispatch: {}

jobs:
  lookup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - name: SG winners lookup
        env:
          ADBOT_ROOT: ${{ github.workspace }}
          ADBOT_CONFIG: ${{ github.workspace }}/config/config.yaml
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
        run: python scripts/sg_bring_to_us.py
