name: adbot · build-pnw (single-image WA/OR/NV geo test, PAUSED)

# Real build of the PNW+NV single-image geo test: build_all over config_us_pnw.yaml ->
# 2 PAUSED CBO campaigns ("MARTIN-PNW | 1-1-6 D/E", 12 ads total) reusing the SAME 12
# single images + the SAME Notion 繁體 captions as the California single-image batch.
# activate_after_build is false -> ZERO spend until you activate. Set WA/OR/NV cities +
# Age 35-65 manually in Ads Manager before launching.
#
# Triggers on manual dispatch or when THIS file changes on the dev branch (same mechanism
# as adbot-build-us-singleimage.yml).

on:
  workflow_dispatch: {}
  push:
    branches: ["claude/meta-adbot-new-project-e6zd1l"]
    paths:
      - ".github/workflows/adbot-build-pnw.yml"

concurrency:
  group: adbot-build-pnw
  cancel-in-progress: false

jobs:
  build-pnw:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # to persist state/ (entity ids, media cache) back to the branch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - name: build_all (PAUSED) — config config_us_pnw.yaml
        env:
          ADBOT_ROOT: ${{ github.workspace }}
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: python -m adbot --config "${{ github.workspace }}/config/config_us_pnw.yaml" build_all
      - name: Persist created entity IDs + media cache back to the branch
        run: |
          git config user.name "adbot"
          git config user.email "noreply@anthropic.com"
          git add state/ || true
          git commit -m "build-pnw: persist created entity ids [skip ci]" || echo "no state change"
          git push || echo "push skipped"
