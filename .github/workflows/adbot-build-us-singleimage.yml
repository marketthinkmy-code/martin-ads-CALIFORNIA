name: adbot · build-us-singleimage (1-1-6 × 2, PAUSED)

# Real build of the US SINGLE-IMAGE batch: build_all over config_us_singleimage.yaml ->
# one PAUSED CBO campaign per subfolder of the "SINGLE IMAGE US" Drive folder
# (1-1-6 D/E = 2 campaigns × 6 ads). Captions READ from Notion by Content ID.
# activate_after_build is false -> ZERO spend until you activate.
#
# Triggers on manual dispatch or when THIS file changes on the dev branch (same mechanism as
# adbot-build-us.yml). Builds are PAUSED; the 7/2 12am Pacific schedule + activation is applied
# separately after the build via the Meta API.

on:
  workflow_dispatch: {}
  push:
    branches: ["claude/meta-adbot-new-project-e6zd1l"]
    paths:
      - ".github/workflows/adbot-build-us-singleimage.yml"

concurrency:
  group: adbot-build-us-singleimage
  cancel-in-progress: false

jobs:
  build-us-singleimage:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # to persist state/ (entity ids, media cache) back to the branch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - name: build_all (PAUSED) — config config_us_singleimage.yaml
        env:
          ADBOT_ROOT: ${{ github.workspace }}
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: python -m adbot --config "${{ github.workspace }}/config/config_us_singleimage.yaml" build_all
      - name: Persist created entity IDs + media cache back to the branch
        run: |
          git config user.name "adbot"
          git config user.email "noreply@anthropic.com"
          git add state/ || true
          git commit -m "build-us-singleimage: persist created entity ids [skip ci]" || echo "no state change"
          git push || echo "push skipped"
