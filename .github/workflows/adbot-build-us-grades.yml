name: adbot · build-us-grades (成績/改變 1-1-5 + 1-1-4, PAUSED)

# Real build of the US 成績/改變 single-image batch: build_all over config_us_grades.yaml ->
# 2 PAUSED CBO campaigns ("MARTIN-CA | 1-1-5 F 成績報喜" 5 ads + "MARTIN-CA | 1-1-4 G 改變見證"
# 4 ads). Captions READ from Notion by Content ID (繁體). activate_after_build is false ->
# ZERO spend until you activate. Triggers on manual dispatch or when THIS file changes on the
# dev branch (same mechanism as the other build workflows).

on:
  workflow_dispatch: {}
  push:
    branches: ["claude/meta-adbot-new-project-e6zd1l"]
    paths:
      - ".github/workflows/adbot-build-us-grades.yml"

concurrency:
  group: adbot-build-us-grades
  cancel-in-progress: false

jobs:
  build-us-grades:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # to persist state/ (entity ids, media cache) back to the branch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - name: build_all (PAUSED) — config config_us_grades.yaml
        env:
          ADBOT_ROOT: ${{ github.workspace }}
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: python -m adbot --config "${{ github.workspace }}/config/config_us_grades.yaml" build_all
      - name: Persist created entity IDs + media cache back to the branch
        run: |
          git config user.name "adbot"
          git config user.email "noreply@anthropic.com"
          git add state/ || true
          git commit -m "build-us-grades: persist created entity ids [skip ci]" || echo "no state change"
          git push || echo "push skipped"
