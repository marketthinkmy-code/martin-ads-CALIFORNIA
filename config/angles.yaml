# ─────────────────────────────────────────────────────────────────────────────
# adbot — ANGLE-FIRST batch (run with: `python -m adbot --config config/angles.yaml build_all`)
# Doctrine: group creatives by ANGLE, then build one 1-1-N per angle (N = videos in that
# angle). A broad ad set lets Meta/Andromeda find the audience from each creative's hook.
# build_all reads every SUBFOLDER of the creatives parent below and creates one PAUSED CBO
# campaign per angle, named "MARTIN-CA | <angle>".
#
# ⚠️ TODO(california): the ANGLE STRUCTURE below is inherited from MY and is NOT set up for
# California yet. Before running build_all you must (1) create a California angles parent folder
# in Drive with one subfolder per angle, and (2) point drive.creatives_folder_id at it. The
# California angles should follow config/audience.md (e.g. 醫療被動·just observe · 亞裔身高差距 ·
# 基因決定論 · 體質·寒涼食物 · 保健品花錢). Platform IDs below are already California's, so this
# config can never touch the MY account.
# ─────────────────────────────────────────────────────────────────────────────

meta:
  ad_account_id: "act_1629566827721449"
  page_id: "1180683238455992"
  instagram_user_id: "17841415309062626"   # set null to fall back to the Page's linked IG if Meta rejects the actor
  pixel_id: "1921735088376759"

  objective: "OUTCOME_SALES"
  optimization_goal: "OFFSITE_CONVERSIONS"
  conversion_event: "COMPLETE_REGISTRATION"
  special_ad_categories: []

  lead_destination:
    type: "WEBSITE"
    link_url: "https://kidsgrowthformula.com/webinar-main-page"
  conversion_domain: "https://kidsgrowthformula.com/"
  call_to_action: "LEARN_MORE"
  url_tags: "utm_source={{adset.name}}&utm_medium={{placement}}&utm_campaign={{campaign.name}}&utm_content={{ad.name}}"

  budget:
    level: "CAMPAIGN"
    daily_amount_myr: 50                   # per-angle CBO daily budget; raise winners after review
    currency: "MYR"
    adset_min_spend_myr: 50

  targeting:                               # identical broad setup to config.yaml
    countries: ["US"]
    age_min: 35                          # suggestion floor; if Meta rejects with advantage_audience=1, set it to 0 or lower age_min to 25
    age_max: 65
    advantage_audience: 1                   # Advantage+ audience ON — broad; creative hook does the targeting
    locales: [1004]
    excluded_custom_audiences:
      - "120236056842490259"               # US 15days complete registration
    # ⚠️ City-level geo not supported by code — set CA cities manually in Ads Manager (see config.yaml).

  build:
    creatives_per_adset: 20                # cap per angle ad set
    activate_after_build: false            # SAFETY: every angle campaign is built PAUSED — zero spend until you activate
    label: "angle"                          # placeholder; build_all overrides it per subfolder with the angle name
    state_key: "entities_angles"           # base key; build_all appends each folder id -> one state file per campaign

naming:
  prefix: "MARTIN-CA"                       # campaigns -> "MARTIN-CA | <angle>"
  weekly_off_label: "ADBOT_WEEKLY_OFF"

drive:
  # ⚠️ TODO(california): replace with a California ANGLES parent folder holding one subfolder per
  # angle. Currently points at the California creatives folder as a placeholder — set up the
  # angle subfolders before running build_all.
  creatives_folder_id: "1lFIYt6Df9jdPu12lRn0R00ZKPMdnoT4z"
  carousel_subfolder_marker: "carousel"
  script_sidecar_ext: ".txt"

google_docs:
  caption_log_doc_id: ""
  idea_backlog_doc_id: ""

notion:                                    # same Notion DB; captions matched by Content ID
  enabled: true
  database_id: "4bb82b42449682c294e881448aa21435"
  brand: "Martin California"
  default_status: "In Review"
  default_type: "Caption"
  captions_source: true
  require_status: ""

kpi:
  cpl_threshold_myr: 100.00
  cpl_min_spend_myr: 100.00
  cpl_lookback: "week_thu"
  pause_zero_lead_after_spend: true
  cpl_hold: []

cpa:
  enabled: true
  spreadsheet_id: "1DsKtcDpsWp3Njfah6Fw3PBizhGiy017ULw5qKeV-RSA"
  sales_tab: "🇺🇸 Paid Student List ($799)"
  price_myr: 997.00
  target_myr: 1000.00
  healthy_max_myr: 1300.00
  max_acceptable_myr: 1700.00
  hard_stop_myr: 2200.00
  conversion_days: 14
  min_spend_myr: 1000.00

schedule:
  timezone: "America/Los_Angeles"
  # weekly_off / weekly_on: NOT SET YET (see config.yaml)
  monitor_interval_hours: 1
