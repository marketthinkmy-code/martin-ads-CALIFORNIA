# ─────────────────────────────────────────────────────────────────────────────
# adbot — US 成績/改變 single-image batch (run with: build_all)
# 9 single images in the "GRADES US" Drive folder, split into 2 subfolders:
#   1-1-5 F 成績報喜 (5 images: 家長報喜合集/四月對比/三月對比/長期雙孩/短期雙孩)
#   1-1-4 G 改變見證 (4 images: 測量波動/鼻敏感/三餐正常/比同齡矮小)
# build_all creates one PAUSED CBO campaign per subfolder ("MARTIN-CA | <subfolder>").
# Captions READ from Notion by Content ID (us_f1_parents_report … us_g4_shorter_than_peers)
# — 繁體 versions of the MY 成績/改變 captions. Everything built PAUSED at 50 MYR/day.
# ─────────────────────────────────────────────────────────────────────────────

meta:
  ad_account_id: "act_1629566827721449"
  page_id: "1180683238455992"
  instagram_user_id: "17841415309062626"   # set null to fall back to the Page's linked IG if Meta rejects the actor
  pixel_id: "1921735088376759"

  objective: "OUTCOME_SALES"
  optimization_goal: "OFFSITE_CONVERSIONS"
  conversion_event: "COMPLETE_REGISTRATION"
  special_ad_categories: []

  lead_destination:
    type: "WEBSITE"
    link_url: "https://kidsgrowthformula.com/webinar-main-page"
  conversion_domain: "https://kidsgrowthformula.com/"
  call_to_action: "LEARN_MORE"
  url_tags: "utm_source={{adset.name}}&utm_medium={{placement}}&utm_campaign={{campaign.name}}&utm_content={{ad.name}}"

  budget:
    level: "CAMPAIGN"
    daily_amount_myr: 50                    # small-budget lead phase (operator: all campaigns 50/day until 16/7)
    currency: "MYR"
    adset_min_spend_myr: 50

  targeting:                               # identical broad setup to config.yaml
    countries: ["US"]
    age_min: 25                            # Advantage+ suggestion floor (hard 35 is rejected with advantage_audience=1)
    age_max: 65
    advantage_audience: 1
    locales: [1004]
    excluded_custom_audiences:
      - "120236056842490259"               # US 15days complete registration
    # ⚠️ City-level geo not supported by code — set CA cities + Age 35-65 manually in Ads Manager.

  build:
    creatives_per_adset: 5                  # cap; F gets 5, G gets its 4
    activate_after_build: false            # SAFETY: every campaign built PAUSED — zero spend until you activate
    label: "us-grades"                      # placeholder; build_all overrides it per subfolder with the subfolder name
    state_key: "entities_us_grades"         # base key; build_all appends each subfolder id -> one state file per campaign

naming:
  prefix: "MARTIN-CA"                       # campaigns -> "MARTIN-CA | 1-1-5 F 成績報喜" / "MARTIN-CA | 1-1-4 G 改變見證"
  weekly_off_label: "ADBOT_WEEKLY_OFF"

drive:
  # "GRADES US (1-1-5 + 1-1-4)" parent holding the 2 subfolders (F/G). Nested under the
  # anyone-with-link reader US folder, so the build service account can read it.
  creatives_folder_id: "1eAp1DP10hZPL6v0JEpkFgM2DkkonFHJl"
  carousel_subfolder_marker: "carousel"
  script_sidecar_ext: ".txt"

google_docs:
  caption_log_doc_id: ""
  idea_backlog_doc_id: ""

notion:
  enabled: true
  database_id: "4bb82b42449682c294e881448aa21435"
  brand: "Martin California"
  default_status: "In Review"
  default_type: "Caption"
  captions_source: true                    # build READS caption+headline FROM Notion by Content ID
  require_status: ""

kpi:
  cpl_threshold_myr: 100.00
  cpl_min_spend_myr: 100.00
  cpl_lookback: "week_thu"
  pause_zero_lead_after_spend: true
  cpl_hold: []

cpa:
  enabled: true
  spreadsheet_id: "1DsKtcDpsWp3Njfah6Fw3PBizhGiy017ULw5qKeV-RSA"
  sales_tab: "🇺🇸 Paid Student List ($799)"
  price_myr: 997.00
  target_myr: 1000.00
  healthy_max_myr: 1300.00
  max_acceptable_myr: 1700.00
  hard_stop_myr: 2200.00
  conversion_days: 14
  min_spend_myr: 1000.00

schedule:
  timezone: "America/Los_Angeles"
  monitor_interval_hours: 1
