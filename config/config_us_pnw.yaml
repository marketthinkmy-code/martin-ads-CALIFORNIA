# ─────────────────────────────────────────────────────────────────────────────
# adbot — US PNW+NV SINGLE-IMAGE geo test (run with: build_all)
# Same 12 single images as config_us_singleimage.yaml (reuses the SAME Drive folder +
# the SAME Notion 繁體 captions by Content ID) — but a SEPARATE campaign structure named
# "MARTIN-PNW | ..." so the Pacific-Northwest + Nevada test data stays cleanly apart from
# the California single-image campaigns.
#
# Purpose: the 7/15 8pm PT live webinar fits PT/MT time zones. This builds a fresh PAUSED
# geo test for Washington / Oregon / Nevada (all PT, 8pm local). Set the CITIES + Age 35-65
# MANUALLY in Ads Manager after build (the code only emits country-level geo):
#   WA: Bellevue · Redmond · Sammamish · Issaquah · Newcastle · Seattle
#   OR: Portland · Beaverton
#   NV: Las Vegas · Henderson
# ─────────────────────────────────────────────────────────────────────────────

meta:
  ad_account_id: "act_1629566827721449"
  page_id: "1180683238455992"
  instagram_user_id: "17841415309062626"   # set null to fall back to the Page's linked IG if Meta rejects the actor
  pixel_id: "1921735088376759"

  objective: "OUTCOME_SALES"
  optimization_goal: "OFFSITE_CONVERSIONS"
  conversion_event: "COMPLETE_REGISTRATION"
  special_ad_categories: []

  lead_destination:
    type: "WEBSITE"
    link_url: "https://kidsgrowthformula.com/webinar-main-page"
  conversion_domain: "https://kidsgrowthformula.com/"
  call_to_action: "LEARN_MORE"
  url_tags: "utm_source={{adset.name}}&utm_medium={{placement}}&utm_campaign={{campaign.name}}&utm_content={{ad.name}}"

  budget:
    level: "CAMPAIGN"
    daily_amount_myr: 50                    # test-phase per-campaign CBO daily budget (2 campaigns × 50 = 100 MYR/day once ALL活)
    currency: "MYR"
    adset_min_spend_myr: 50

  targeting:                               # identical broad setup to config.yaml (country-level only)
    countries: ["US"]
    age_min: 25                            # Advantage+ suggestion floor (hard 35 is rejected with advantage_audience=1)
    age_max: 65
    advantage_audience: 1
    locales: [1004]
    excluded_custom_audiences:
      - "120236056842490259"               # US 15days complete registration
    # ⚠️ Set WA/OR/NV CITIES + Age 35-65 manually in Ads Manager after build (see header).

  build:
    creatives_per_adset: 6                  # the "N" in 1-1-6
    activate_after_build: false            # SAFETY: every campaign built PAUSED — zero spend until you activate
    label: "pnw-si"                         # placeholder; build_all overrides it per subfolder with the subfolder name
    state_key: "entities_pnw_si"            # SEPARATE state file — never touches the California single-image campaigns

naming:
  prefix: "MARTIN-PNW"                      # campaigns -> "MARTIN-PNW | 1-1-6 D 體質飲食睡眠" / "... E 基因青春期同齡"
  weekly_off_label: "ADBOT_WEEKLY_OFF"

drive:
  # SAME "SINGLE IMAGE US" parent as config_us_singleimage.yaml — reuses the identical 12 images
  # (D/E subfolders). build_all reads the 2 subfolders; captions come from Notion by Content ID.
  creatives_folder_id: "1lNpLcKHqKNToSzk5u5XwgRowTN7SjEn6"
  carousel_subfolder_marker: "carousel"
  script_sidecar_ext: ".txt"

google_docs:
  caption_log_doc_id: ""
  idea_backlog_doc_id: ""

notion:
  enabled: true
  database_id: "4bb82b42449682c294e881448aa21435"
  brand: "Martin California"
  default_status: "In Review"
  default_type: "Caption"
  captions_source: true                    # build READS caption+headline FROM Notion by Content ID (same rows as the CA single images)
  require_status: ""

kpi:
  cpl_threshold_myr: 100.00
  cpl_min_spend_myr: 100.00
  cpl_lookback: "week_thu"
  pause_zero_lead_after_spend: true
  cpl_hold: []

cpa:
  enabled: true
  spreadsheet_id: "1DsKtcDpsWp3Njfah6Fw3PBizhGiy017ULw5qKeV-RSA"
  sales_tab: "🇺🇸 Paid Student List ($799)"
  price_myr: 997.00
  target_myr: 1000.00
  healthy_max_myr: 1300.00
  max_acceptable_myr: 1700.00
  hard_stop_myr: 2200.00
  conversion_days: 14
  min_spend_myr: 1000.00

schedule:
  timezone: "America/Los_Angeles"
  monitor_interval_hours: 1
